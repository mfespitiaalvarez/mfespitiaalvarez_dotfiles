# ==========================
# General Settings
# ==========================
# Change prefix from Ctrl+B to Ctrl+A
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Mouse only inside copy-mode.
# Outside copy-mode the terminal handles scroll/select natively (no auto-enter
# into copy-mode on wheel scroll). prefix-[ enters copy-mode and the hook
# flips mouse on; q / Esc / Enter / y / Y exit and flip it back off.
# Note: after-copy-mode fires on entry only (cancel doesn't trigger it),
# so every exit path must explicitly run `set -g mouse off`.
set -g mouse off
set-hook -g after-copy-mode 'set -g mouse on'

# Fix colors for Neovim (Crucial for CloudTop/SSH)
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ==========================
# Navigation & Splits
# ==========================
# 'o' for horizontal, 'e' for vertical
unbind '"'
unbind %
bind o split-window -v -c "#{pane_current_path}"
bind e split-window -h -c "#{pane_current_path}"

# Seamless Vim/Tmux Navigation
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Resize panes using Alt-direction (No prefix)
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# ==========================
# Copy Mode & OS-Aware Clipboard
# ==========================
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection

# 1. Disable OSC 52 auto-syncing to OS clipboard to enforce the "split"
set -g set-clipboard off

# Cancel paths: every binding that exits copy-mode must also flip mouse off.
bind -T copy-mode-vi q      send-keys -X cancel                    \; set -g mouse off
bind -T copy-mode-vi Escape send-keys -X cancel                    \; set -g mouse off
bind -T copy-mode-vi Enter  send-keys -X copy-selection-and-cancel \; set -g mouse off

# Mouse drag-release: keep selection visible and stay in copy-mode (mouse stays on)
# so you can press Y for the OS clipboard. Default behavior would cancel copy-mode
# after release, which would leave mouse stuck on (no exit binding fires).
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# 2. Lowercase 'y': Copies ONLY to tmux's internal buffer
bind -T copy-mode-vi y send -X copy-selection-and-cancel \; set -g mouse off

# 3. Capital 'Y': OS-Aware copy to system clipboard
# WSL2 (Windows)
if-shell -b 'grep -qi wsl /proc/version' \
    'bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "clip.exe" \; set -g mouse off'

# Native Linux (gLinux / CloudTop)
if-shell -b 'uname | grep -q Linux && ! grep -qi wsl /proc/version' \
    'bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard" \; set -g mouse off'

# macOS
if-shell -b 'uname | grep -q Darwin' \
    'bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "pbcopy" \; set -g mouse off'

# ==========================
# System Bindings
# ==========================
# Reload config
bind r source-file ~/.tmux.conf \; display "Tmux Config Reloaded!"
# Kill window without confirmation
bind-key & kill-window
