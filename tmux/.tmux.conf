# ==========================
# General Settings
# ==========================
# Change prefix from Ctrl+B to Ctrl+A
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support
set -g mouse on

# Fix colors for Neovim (Crucial for CloudTop/SSH)
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ==========================
# Navigation & Splits
# ==========================
# 'o' for horizontal, 'e' for vertical
unbind '"'
unbind %
bind o split-window -v -c "#{pane_current_path}"
bind e split-window -h -c "#{pane_current_path}"

# Seamless Vim/Tmux Navigation
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Resize panes using Alt-direction (No prefix)
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# ==========================
# Copy Mode & OS-Aware Clipboard
# ==========================
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection

# 1. Disable OSC 52 auto-syncing to OS clipboard to enforce the "split"
set -g set-clipboard off

# 2. Lowercase 'y': Copies ONLY to tmux's internal buffer
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# 3. Capital 'Y': OS-Aware copy to system clipboard
# WSL2 (Windows)
if-shell -b 'grep -qi wsl /proc/version' \
    'bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "clip.exe"'

# Native Linux (gLinux / CloudTop)
if-shell -b 'uname | grep -q Linux && ! grep -qi wsl /proc/version' \
    'bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'

# macOS
if-shell -b 'uname | grep -q Darwin' \
    'bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "pbcopy"'

# ==========================
# System Bindings
# ==========================
# Reload config
bind r source-file ~/.tmux.conf \; display "Tmux Config Reloaded!"
# Kill window without confirmation
bind-key & kill-window
